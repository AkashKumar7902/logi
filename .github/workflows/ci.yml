name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Verify formatting
        run: |
          set -euo pipefail
          gofmt -l . > /tmp/gofmt.out
          if [ -s /tmp/gofmt.out ]; then
            cat /tmp/gofmt.out
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
